name: Deploy Template Gallery

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Compute site environment
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner="${GITHUB_REPOSITORY_OWNER}"

          if [ "$repo_name" = "${owner}.github.io" ]; then
            echo "SITE_URL=https://${owner}.github.io" >> "$GITHUB_ENV"
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "SITE_URL=https://${owner}.github.io" >> "$GITHUB_ENV"
            echo "BASE_PATH=/$repo_name" >> "$GITHUB_ENV"
          fi

          echo "PUBLIC_REPOSITORY_URL=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" >> "$GITHUB_ENV"
          echo "PUBLIC_REPOSITORY_REF=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build static site
        working-directory: web
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
